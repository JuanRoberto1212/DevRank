services:
  postgres:
    image: postgres:17-alpine
    container_name: devrank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-devrank}
      POSTGRES_USER: ${DB_USER:-devrank}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devrank123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devrank} -d ${DB_NAME:-devrank}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
