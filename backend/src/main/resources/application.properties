spring.application.name=devrank-backend

spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST:${POSTGRES_HOST:localhost}}:${DB_PORT:${POSTGRES_PORT:5432}}/${DB_NAME:${POSTGRES_DB:devrank}}
spring.datasource.username=${DB_USER:${POSTGRES_USER:devrank}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:devrank123}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.error.include-message=always

app.jwt.secret=${JWT_SECRET:sua-chave-jwt-aqui}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
